; Example Rucio configuration
; Copy this to ~/.rucio/rucio.cfg

[database]
; Database connection string (will be overridden by env var RUCIO_CFG_DATABASE_DEFAULT if set)
default = postgresql+psycopg://rucio_user:ruciosecret123@rucio-db:5432/rucio_db

[alembic]
; Location of alembic config generated by rucio-init entrypoint
cfg = /opt/rucio/etc/alembic.ini

[client]
; Default account used by the client
account = root

; Rucio server base URL (use internal compose service name)
rucio_host = http://rucio-server:80

; Authentication server (if separate) - point at the server for simple setups
auth_host = http://rucio-server:80

; Authentication type: userpass, x509, or oidc depending on your deployment
; For local testing with the rucio-server image, `userpass` can be used with env vars
auth_type = userpass
username = ddmlab
password = secret

; X.509 settings (only needed if auth_type = x509)
;cert = /etc/grid-security/hostcert.pem
;key = /etc/grid-security/hostkey.pem
;ca_cert = /etc/grid-security/cacert.pem
