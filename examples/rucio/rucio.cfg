; Rucio client configuration for the pydasi Rucio backend examples.
;
; This file ships with working defaults for the devcontainer Rucio + MinIO
; stack.  Edit the values below before running list.py / retrieve.py /
; archive.py against any other deployment.
;
; The pydasi Rucio backend passes this file via the RUCIO_CONFIG env var.
; You can also place it at ~/.rucio/rucio.cfg for system-wide use.

[client]
; ---- Server endpoints -------------------------------------------------------
; URL of the Rucio REST API server.
; Inside the devcontainer Compose network use the service name:
rucio_host = http://rucio-server:80

; Authentication server.  For single-node setups point at the same server.
auth_host = http://rucio-server:80

; ---- Authentication ---------------------------------------------------------
; Choose one of: userpass | x509 | oidc
auth_type = userpass

; userpass credentials (used when auth_type = userpass).
; The devcontainer default account is the built-in "ddmlab" superuser.
; Change these for any real deployment.
username = ddmlab
password = secret

; Account to act on behalf of.
account = root

; Virtual organisation — required for multi-VO deployments; "def" is the
; default single-VO name used by the Rucio devcontainer.
vo = def

; ---- X.509 (uncomment when auth_type = x509) --------------------------------
;cert    = /etc/grid-security/hostcert.pem
;key     = /etc/grid-security/hostkey.pem
;ca_cert = /etc/grid-security/cacert.pem

; ---- TLS --------------------------------------------------------------------
; Point at a CA bundle to enable TLS verification.
; Set to False ONLY in local development with plain HTTP or self-signed certs.
; Never disable in production.
ca_cert = ./rucio_ca_bundle.pem
;ca_cert = False
