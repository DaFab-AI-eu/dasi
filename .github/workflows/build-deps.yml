name: Build Deps Image

on:
  workflow_dispatch:
  schedule:
    # Weekly rebuild (Mon 03:00 UTC) to pick up upstream security updates.
    - cron: '0 3 * * 1'
  push:
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-deps.yml'
      - '.devcontainer/docker-compose.yml'

concurrency:
  group: build-deps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute base image reference
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "DEPS_IMAGE=ghcr.io/${owner}/dasi-build-deps:latest" >> "$GITHUB_ENV"

      - name: Build and push the build-dependencies stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: build-dependencies
          push: true
          tags: ${{ env.DEPS_IMAGE }}
          labels: |
            org.opencontainers.image.title=DASI build dependencies
            org.opencontainers.image.description=Base image with compilers, build tools, and pre-built dependencies (ecbuild, libaec, AWS SDK for C++) used to build DASI.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=ECMWF
            org.opencontainers.image.revision=${{ github.sha }}
          annotations: |
            org.opencontainers.image.description=Base image with compilers, build tools, and pre-built dependencies (ecbuild, libaec, AWS SDK for C++) used to build DASI.
          cache-from: type=registry,ref=${{ env.DEPS_IMAGE }}
          cache-to: type=inline
