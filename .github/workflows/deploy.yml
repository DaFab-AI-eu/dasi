name: Create and publish DASI Docker image

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive DASI version from tag
        run: echo "DASI_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Compute base image reference
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "DEPS_IMAGE=ghcr.io/${owner}/dasi-build-deps:latest" >> "$GITHUB_ENV"

      - name: Write compose .env
        run: |
          cat > .devcontainer/.env << EOF
          DASI_VERSION=${{ env.DASI_VERSION }}
          DEPS_IMAGE=${{ env.DEPS_IMAGE }}
          EOF

      - name: Build runtime image via docker compose
        run: docker compose -f .devcontainer/docker-compose.yml build runtime

      - name: Tag and push to GHCR
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker tag "dasi:${{ env.DASI_VERSION }}" "$tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
